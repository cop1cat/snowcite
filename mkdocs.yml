site_name: snowcite
site_description: MCP server for systematic literature review
site_url: https://cop1cat.github.io/snowcite/
repo_url: https://github.com/cop1cat/snowcite
repo_name: cop1cat/snowcite

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ru
          name: Русский
          build: true
          nav_translations:
            Home: Главная
            Installation: Установка
            Getting started: Начало работы
            Workflow: Workflow
            Artifacts: Артефакты
            Backends: Бэкенды
            Troubleshooting: Диагностика

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting started: getting-started.md
  - Workflow: workflow.md
  - Artifacts: artifacts.md
  - Backends: backends.md
  - Troubleshooting: troubleshooting.md
